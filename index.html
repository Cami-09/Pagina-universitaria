<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNICIENCIA SYSTEM PRO</title>

<!-- Firebase v8 (CORRECTO PARA TU CÓDIGO) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef1f5}

/* HEADER */
header{
background:#002147;
color:#fff;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
cursor:pointer;
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
width:220px;
background:#00152e;
color:white;
height:100vh;
padding:20px;
display:none;
}

.sidebar div{
margin:15px 0;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
padding:30px;
}

/* CARDS */
.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* INPUT */
input{
padding:10px;
width:100%;
margin:5px 0;
}

button{
padding:10px;
background:#002147;
color:white;
border:none;
cursor:pointer;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1');
background-size:cover;
color:white;
padding:100px;
text-align:center;
}

/* HIDDEN */
.hidden{display:none}
</style>
</head>

<body>

<header>
<h2>UNICIENCIA</h2>
<nav>
<a onclick="showHome()">Inicio</a>
<a onclick="showLogin()">Login</a>
</nav>
</header>

<div class="container">

<!-- SIDEBAR ADMIN -->
<div class="sidebar" id="sidebar">
<h3>Panel Admin</h3>
<div onclick="showAdmin('programas')">Programas</div>
<div onclick="showAdmin('usuarios')">Usuarios</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home">
<div class="hero">
<h1>Plataforma Educativa</h1>
<p>Sistema universitario digital</p>
</div>

<h3>Programas</h3>
<div id="programasPublic"></div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
<h2>Login / Registro</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<!-- PROGRAMAS -->
<div id="adminProgramas">
<h2>Gestión de Programas</h2>
<input id="prog" placeholder="Nombre programa">
<button onclick="addPrograma()">Agregar</button>

<div id="listaAdmin"></div>
</div>

<!-- USUARIOS -->
<div id="adminUsuarios" class="hidden">
<h2>Usuarios</h2>
<div id="listaUsers"></div>
</div>

</div>

</div>
</div>

<script>

/* =========================
   FIREBASE CONFIG (TU CONFIG)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyBFMzuABuWWLc_4UCYmZNIs0SpqlaLmggc",
  authDomain: "pagina-web-universitaria.firebaseapp.com",
  databaseURL: "https://pagina-web-universitaria-default-rtdb.firebaseio.com",
  projectId: "pagina-web-universitaria",
  storageBucket: "pagina-web-universitaria.firebasestorage.app",
  messagingSenderId: "295859033709",
  appId: "1:295859033709:web:7cdb2f9f2e7e0801e65164",
  measurementId: "G-T3SL6356LE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* =========================
   ELEMENTOS DOM
========================= */
const home = document.getElementById("home");
const loginDiv = document.getElementById("login");
const admin = document.getElementById("admin");
const sidebar = document.getElementById("sidebar");

const listaAdmin = document.getElementById("listaAdmin");
const listaUsers = document.getElementById("listaUsers");
const programasPublic = document.getElementById("programasPublic");

/* =========================
   NAV
========================= */
function showHome(){
hideAll();
home.classList.remove("hidden");
}

function showLogin(){
hideAll();
loginDiv.classList.remove("hidden");
}

function hideAll(){
home.classList.add("hidden");
loginDiv.classList.add("hidden");
admin.classList.add("hidden");
}

/* =========================
   AUTH
========================= */
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>{
db.collection("users").add({
email: email.value,
role: "estudiante"
});
alert("Usuario creado");
})
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(user=>{
checkRole(user.user.email);
})
.catch(e=>alert(e.message));
}

/* =========================
   ROLE SYSTEM
========================= */
async function checkRole(emailUser){

let q = await db.collection("users")
.where("email","==",emailUser)
.get();

let isAdmin = false;

q.forEach(doc=>{
if(doc.data().role === "admin"){
isAdmin = true;
}
});

if(isAdmin){
sidebar.style.display="block";
admin.classList.remove("hidden");
home.classList.add("hidden");
} else {
alert("Login exitoso como estudiante");
showHome();
}

}

/* =========================
   ADMIN NAV
========================= */
function showAdmin(section){
document.getElementById("adminProgramas").style.display="none";
document.getElementById("adminUsuarios").style.display="none";

if(section==="programas"){
document.getElementById("adminProgramas").style.display="block";
}
if(section==="usuarios"){
document.getElementById("adminUsuarios").style.display="block";
}
}

/* =========================
   PROGRAMAS CRUD
========================= */
function addPrograma(){
db.collection("programas").add({
nombre: prog.value
});
prog.value="";
}

function loadProgramas(){
db.collection("programas").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
html += `
<div class="card">
${doc.data().nombre}
<button onclick="del('${doc.id}')">Eliminar</button>
</div>`;
});

listaAdmin.innerHTML = html;
programasPublic.innerHTML = html;
});
}

function del(id){
db.collection("programas").doc(id).delete();
}

/* =========================
   USUARIOS
========================= */
function loadUsers(){
db.collection("users").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
html += `<div class="card">${doc.data().email} - ${doc.data().role}</div>`;
});
listaUsers.innerHTML = html;
});
}

/* INIT */
loadProgramas();
loadUsers();

</script>

</body>
</html>
