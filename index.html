<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>UNICIENCIA PRO SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#002147;color:#fff;padding:15px;display:flex;justify-content:space-between}
nav a{color:#fff;margin:10px;cursor:pointer}
.section{display:none;padding:40px}
.active{display:block}
.card{background:#fff;padding:20px;margin:10px;border-radius:10px}
input{padding:10px;margin:5px;width:100%}
button{padding:10px;background:#002147;color:#fff;border:none}
</style>
</head>

<body>

<header>
<h2>UNICIENCIA</h2>
<nav>
<a onclick="show('inicio')">Inicio</a>
<a onclick="show('programas')">Programas</a>
<a onclick="show('login')">Login</a>
<a onclick="show('admin')">Admin</a>
</nav>
</header>

<!-- INICIO -->
<div id="inicio" class="section active">
<h1>Bienvenido</h1>
<p>Universidad digital</p>
</div>

<!-- PROGRAMAS -->
<div id="programas" class="section">
<h1>Programas</h1>
<div id="listaProgramas"></div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h1>Login / Registro</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="register()">Registrarse</button>
<button onclick="login()">Iniciar Sesión</button>

<p id="user"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h1>Panel Admin</h1>

<input id="progNombre" placeholder="Nombre programa">
<button onclick="guardarPrograma()">Guardar</button>
</div>

<script>
// 🔥 CONFIG (PON LA TUYA)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_ID",
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// SPA NAV
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// AUTH
function register(){
auth.createUserWithEmailAndPassword(
email.value,
password.value
)
.then(()=>alert("Registrado"))
.catch(e=>alert(e.message))
}

function login(){
auth.signInWithEmailAndPassword(
email.value,
password.value
)
.then(()=>alert("Bienvenido"))
.catch(e=>alert(e.message))
}

// GUARDAR PROGRAMAS
function guardarPrograma(){
db.collection("programas").add({
nombre: progNombre.value
})
}

// LISTAR PROGRAMAS
function cargarProgramas(){
db.collection("programas").onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
html += `<div class="card">${doc.data().nombre}</div>`;
});
listaProgramas.innerHTML = html;
});
}

cargarProgramas();

// USUARIO ACTIVO
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("user").innerText = "Logueado: " + user.email;
}
});
</script>

</body>
</html>
