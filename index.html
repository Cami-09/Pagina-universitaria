<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIVERSIDAD PRO SYSTEM</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef1f5}

/* HEADER */
header{
background:#002147;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
width:220px;
background:#00152e;
color:white;
height:100vh;
padding:20px;
display:none;
}

/* MAIN */
.main{flex:1;padding:20px}

/* CARDS */
.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px;
background:#002147;
color:white;
border:none;
cursor:pointer;
}

/* BANNER */
.banner img{
width:100%;
height:350px;
object-fit:cover;
border-radius:10px;
}

/* HIDDEN */
.hidden{display:none}
</style>
</head>

<body>

<header>
<h2>UNIVERSIDAD PRO</h2>
<div>
<button onclick="showLogin()">Login</button>
</div>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h3>ADMIN</h3>
<button onclick="view('users')">Usuarios</button>
<button onclick="view('programs')">Programas</button>
<button onclick="view('banner')">Banner</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home">

<div class="banner" id="banner"></div>

<h3>Programas</h3>
<div id="programsPublic"></div>

</div>

<!-- LOGIN -->
<div id="login" class="hidden">

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Registro</button>
<button onclick="login()">Entrar</button>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div id="usersView" class="hidden">
<h2>Usuarios</h2>
<div id="usersList"></div>
</div>

<div id="programsView" class="hidden">
<h2>Programas</h2>
<input id="programName">
<button onclick="addProgram()">Agregar</button>
<div id="programList"></div>
</div>

<div id="bannerView" class="hidden">
<h2>Banner</h2>
<input type="file" onchange="uploadBanner(this.files[0])">
</div>

</div>

</div>
</div>

<script>

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* ================= DOM ================= */
const sidebar = document.getElementById("sidebar");
const home = document.getElementById("home");
const loginDiv = document.getElementById("login");
const admin = document.getElementById("admin");

/* ================= NAV ================= */
function showLogin(){
home.classList.add("hidden");
loginDiv.classList.remove("hidden");
}

/* ================= AUTH ================= */
function register(){
auth.createUserWithEmailAndPassword(email.value,pass.value)
.then(u=>{
db.collection("users").doc(u.user.uid).set({
email: email.value,
role: "student"
});
});
}

function login(){
auth.signInWithEmailAndPassword(email.value,pass.value)
.then(u=>{
checkRole(u.user.uid);
});
}

/* ================= ROLE ================= */
async function checkRole(uid){
let doc = await db.collection("users").doc(uid).get();

if(doc.data().role === "admin"){
sidebar.style.display="block";
admin.classList.remove("hidden");
home.classList.add("hidden");
} else {
alert("Bienvenido estudiante");
}
}

/* ================= PROGRAMS ================= */
function addProgram(){
db.collection("programs").add({
name: programName.value
});
}

function loadPrograms(){
db.collection("programs").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
html += `<div class="card">${doc.data().name}</div>`;
});
programList.innerHTML = html;
programsPublic.innerHTML = html;
});
}

/* ================= USERS (ADMIN) ================= */
function loadUsers(){
db.collection("users").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
html += `
<div class="card">
${doc.data().email}
<select onchange="updateRole('${doc.id}',this.value)">
<option value="student">student</option>
<option value="admin">admin</option>
</select>
<button onclick="deleteUser('${doc.id}')">Eliminar</button>
</div>`;
});
usersList.innerHTML = html;
});
}

function updateRole(id,role){
db.collection("users").doc(id).update({role});
}

function deleteUser(id){
db.collection("users").doc(id).delete();
}

/* ================= BANNER ================= */
let images = [];
let index = 0;

function uploadBanner(file){
let ref = storage.ref("banner/"+file.name);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.collection("banner").add({url});
});
});
}

function loadBanner(){
db.collection("banner").onSnapshot(snap=>{
images = [];
snap.forEach(doc=>{
images.push(doc.data().url);
});
});
}

setInterval(()=>{
if(images.length>0){
index = (index+1)%images.length;
banner.innerHTML = `<img src="${images[index]}">`;
}
},3000);

/* ================= ADMIN NAV ================= */
function view(section){
usersView.classList.add("hidden");
programsView.classList.add("hidden");
bannerView.classList.add("hidden");

if(section==="users") usersView.classList.remove("hidden");
if(section==="programs") programsView.classList.remove("hidden");
if(section==="banner") bannerView.classList.remove("hidden");
}

/* ================= INIT ================= */
loadPrograms();
loadUsers();
loadBanner();

</script>

</body>
</html>
